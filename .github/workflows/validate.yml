name: Validate Markdown

on:
  push:
    branches: [main]
    paths:
      - 'world/**'
      - 'playbook/**'
      - 'ai/**'
      - 'templates/**'
      - 'examples/**'
      - 'projects/**'
      - 'scripts/**'
      - 'Makefile'
      - '*.md'
  pull_request:
    paths:
      - 'world/**'
      - 'playbook/**'
      - 'ai/**'
      - 'templates/**'
      - 'examples/**'
      - 'projects/**'
      - 'scripts/**'
      - 'Makefile'
      - '*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run markdown validation
        run: make validate
