name: Validate Markdown

# Job id "validate" is required for branch protection. Do not rename this job.

on:
  push:
    branches: [main]
    paths:
      - 'world/**'
      - 'playbook/**'
      - 'ai/**'
      - 'templates/**'
      - 'examples/**'
      - 'projects/**'
      - 'scripts/**'
      - '.github/**'
      - 'reference/**'
      - 'theory/**'
      - 'CODEOWNERS'
      - '.gitignore'
      - 'Makefile'
      - '**/*.md'
  pull_request:
    paths:
      - 'world/**'
      - 'playbook/**'
      - 'ai/**'
      - 'templates/**'
      - 'examples/**'
      - 'projects/**'
      - 'scripts/**'
      - '.github/**'
      - 'reference/**'
      - 'theory/**'
      - 'CODEOWNERS'
      - '.gitignore'
      - 'Makefile'
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run markdown validation
        run: make validate
